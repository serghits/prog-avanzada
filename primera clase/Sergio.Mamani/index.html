<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Presentación</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #000000, #4b0082);
        font-family: Arial, Helvetica, sans-serif;
      }

      .contenedor {
        background: rgba(255, 255, 255, 0.08);
        padding: 40px;
        border-radius: 20px;
        width: 400px;
        text-align: center;
        box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.5);
        border: 2px solid #8a2be2;
      }

      .circulo {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: #583e71;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: auto;
        font-size: 50px;
        color: white;
        font-weight: bold;
        border: 4px solid black;
      }

      .texto {
        margin-top: 30px;
        background: black;
        padding: 20px;
        border-radius: 15px;
        color: white;
        line-height: 1.6;
        border: 2px solid #8a2be2;
      }
    </style>
  </head>
  <body>
    <div class="contenedor">
      <div class="circulo">S</div>

      <div class="texto">
        Mi nombre es Sergio Mamani Samo, soy estudiante de la carrera de
        Ingeniería de Sistemas del 5to semestre cursando la materia de
        Programación Avanzada, materia la cual espero aprovecharla y aprender lo
        más posible.
      </div>
    </div>
  </body>
</html>
