<!-- HTML5 -->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentación de Estudiante</title>

    <style>
        /* Fondo general oscuro */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Tarjeta principal */
        .tarjeta {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 20px;

            /* Contorno */
            border: 2px solid #444;

            /* Sombra oscura */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);

            text-align: center;
            max-width: 350px;
        }

        /* Círculo de perfil */
        .circulo-foto {
            width: 120px;
            height: 120px;

            /* Degradado oscuro */
            background: linear-gradient(135deg, #2c3e50 0%, #000000 100%);

            border-radius: 50%;

            /* Contorno blanco */
            border: 3px solid white;

            margin: 0 auto 20px auto;

            display: flex;
            justify-content: center;
            align-items: center;

            color: white;
            font-size: 50px;
            font-weight: bold;
        }

        /* Título */
        h1 {
            margin: 0 0 5px;
            color: white;
        }

        /* Subtítulo */
        h3 {
            margin: 0 0 15px;
            color: #b0b0b0;
            font-weight: normal;
        }

        /* Texto */
        p {
            color: #f1f1f1;
            line-height: 1.6;
        }
    </style>
</head>

<body>

    <div class="tarjeta">

        <div class="circulo-foto">
            D
        </div>

        <h1>Duban condori </h1>

        <h3>Universitario de Ing Sistemas</h3>

        <p>
            ¡Hola! Soy estudiante universitario y músico, actualmente estudio Ingeniería de Sistemas
            y me gusta la carrera y me agradan mucho con los compañeros con los que me toco.
        </p>

    </div>

</body>

</html>
