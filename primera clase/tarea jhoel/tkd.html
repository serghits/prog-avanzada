<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentación Taekwondo</title>

    <style>

        body{
            margin:0;
            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background: linear-gradient(135deg, #111, #b30000);

            font-family: Arial, Helvetica, sans-serif;
        }

        .tarjeta{
            width:350px;
            background:white;

            border-radius:20px;

            padding:30px;

            text-align:center;

            box-shadow:0px 10px 25px rgba(0,0,0,0.4);
        }

        .circulo{
            width:120px;
            height:120px;

            background:black;

            border:5px solid red;

            border-radius:50%;

            margin:auto;

            color:white;

            font-size:45px;
            font-weight:bold;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        h1{
            color:#b30000;
            margin-top:20px;
        }

        h3{
            color:#333;
        }

        p{
            color:#555;
            line-height:1.5;
        }

        .cinturon{
            margin-top:20px;

            background:black;

            color:white;

            padding:10px;

            border-radius:10px;

            font-weight:bold;
        }

    </style>
</head>

<body>

    <div class="tarjeta">

        <div class="circulo">
            T
        </div>

        <h1>Tu Nombre</h1>

        <h3>Practicante de Taekwondo</h3>

        <p>
            Apasionado por las artes marciales, la disciplina y el desarrollo físico y mental.
        </p>

        <div class="cinturon">
            Cinturón Azul
        </div>

    </div>

</body>

</html>
